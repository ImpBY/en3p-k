# ===========================================================================
# Firmware Features
# ===========================================================================

[firmware_retraction]
retract_length: 0.5
retract_speed: 40
unretract_extra_length: 0
unretract_speed: 40

[gcode_arcs]
resolution: 0.1

[pause_resume]
recover_velocity: 50

[respond]

[exclude_object]

[force_move]
enable_force_move: True

# ===========================================================================
# Virtual SD Card
# ===========================================================================

[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[display_status]

[save_variables]
filename: ~/printer_data/config/variables.cfg

# ===========================================================================
# Endstop Phase Calibration
# ===========================================================================

[endstop_phase stepper_x]
# Improves homing accuracy by using stepper phase

[endstop_phase stepper_y]
# Improves homing accuracy by using stepper phase


# ===========================================================================
# Idle Timeout
# ===========================================================================

[idle_timeout]
gcode:
  # Turn off heaters
  TURN_OFF_HEATERS
  # Turn off motors after timeout
  M84
  # Display message
  M117 Idle timeout
timeout: 1800  # 30 minutes


# ===========================================================================
# Startup Sequence
# ===========================================================================

[delayed_gcode _startup_sequence]
initial_duration: 1.0
gcode:
  # Display startup message
  M117 Neptune 3 Pro K

  # Load saved bed mesh (if exists)
  BED_MESH_PROFILE LOAD=default

  # Set conservative speeds for safety
  # These will be overridden by slicer settings during print
  SET_VELOCITY_LIMIT VELOCITY=150 ACCEL=2000 SQUARE_CORNER_VELOCITY=5

  # Status LED (if configured)
  # LED_ON

  # Log startup
  RESPOND MSG="Printer initialized successfully"

  # SET_HEATER_TEMPERATURE HEATER=extruder TARGET=250

# ===========================================================================
# Macroses
# ===========================================================================

[gcode_macro _SET_SAFE_MOTION]
description: "Hidden helper: set temporary conservative motion limits"
gcode:
  {% set velocity = params.VELOCITY|default(100)|float %}
  {% set accel = params.ACCEL|default(600)|float %}
  SET_VELOCITY_LIMIT VELOCITY={velocity} ACCEL={accel}

[gcode_macro _RESTORE_MOTION_LIMITS]
description: "Hidden helper: restore configured motion limits"
gcode:
  SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel}

[gcode_macro _HOME_IF_NEEDED]
description: "Hidden helper: home only required axes"
gcode:
  {% set axes = params.AXES|default("XYZ")|upper %}
  {% if axes == "XYZ" %}
    {% if "xyz" not in printer.toolhead.homed_axes %}
      G28
    {% endif %}
  {% elif axes == "XY" %}
    {% if "x" not in printer.toolhead.homed_axes or "y" not in printer.toolhead.homed_axes %}
      G28 X Y
    {% endif %}
  {% elif axes == "Z" %}
    {% if "z" not in printer.toolhead.homed_axes %}
      G28 Z
    {% endif %}
  {% else %}
    {action_raise_error("Invalid AXES for _HOME_IF_NEEDED")}
  {% endif %}

[gcode_macro _SYSTEMS_OFF]
description: "Hidden helper: shutdown heaters/fans/motors"
gcode:
  {% set heaters = params.HEATERS|default(1)|int %}
  {% set fans = params.FANS|default(1)|int %}
  {% set motors = params.MOTORS|default(1)|int %}
  {% if heaters == 1 %}
    M104 S0
    M140 S0
  {% endif %}
  {% if fans == 1 %}
    M107
  {% endif %}
  {% if motors == 1 %}
    M84
  {% endif %}

