###############################################################################################################################################################################
# START_PRINT and END_PRINT
###############################################################################################################################################################################

[gcode_macro START_PRINT]
gcode:
  # Stop pending end-of-print cooldown watcher from previous job
  UPDATE_DELAYED_GCODE ID=_END_PRINT_FAN_COOLDOWN DURATION=0

  {% set BED_TEMP = params.BED|default(60)|float %}
  {% set EXTRUDER_TEMP = params.EXTRUDER|default(230)|float %}

  # Get current temperatures
  {% set CURRENT_BED_TEMP = printer.heater_bed.temperature|float %}
  {% set CURRENT_EXTRUDER_TEMP = printer.extruder.temperature|float %}

  # Calculate preheat targets
  {% set BED_PREHEAT = BED_TEMP * 0.8 %}
  # Tap-safe extruder temperature: hot enough to wipe the nozzle clean,
  # cool enough to avoid oozing and PEI damage during the tap
  {% set TAP_EXTRUDER_TEMP = [EXTRUDER_TEMP, 170]|min %}

  # Use current temperature if it's already higher than preheat target
  {% if CURRENT_BED_TEMP > BED_PREHEAT %}
    {% set BED_PREHEAT = CURRENT_BED_TEMP %}
  {% endif %}

  _SET_SAFE_MOTION

  {% set shaper = params.SHAPER|default(1)|int %}
  {% if shaper == 0 %}
  SET_INPUT_SHAPER SHAPER_FREQ_X=0 SHAPER_FREQ_Y=0
  {% endif %}

  # clear current mesh
  BED_MESH_CLEAR

  # set bed temperature for preheat
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={BED_TEMP}
  # Check if bed preheat is needed (skip if already above 95% of target)
  {% set bed_threshold = BED_PREHEAT * 0.95 %}
  {% if CURRENT_BED_TEMP < bed_threshold %}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED_PREHEAT}
  {% endif %}

  # Heat extruder to the tap-safe temperature only; full printing
  # temperature is set after the tap to keep the nozzle clean
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET={TAP_EXTRUDER_TEMP}
  # Wait for the tap window (also waits for cooldown after a hot restart)
  {% if CURRENT_EXTRUDER_TEMP < TAP_EXTRUDER_TEMP - 5 or CURRENT_EXTRUDER_TEMP > TAP_EXTRUDER_TEMP + 15 %}
    {% if CURRENT_EXTRUDER_TEMP > TAP_EXTRUDER_TEMP + 15 %}
      M106 S255  # Speed up cooldown with the part fan
    {% endif %}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={TAP_EXTRUDER_TEMP - 5} MAXIMUM={TAP_EXTRUDER_TEMP + 15}
    M107
  {% endif %}

  # wait for bed temperature (skip if already above 95% of target)
  {% set bed_final_threshold = BED_TEMP * 0.95 %}
  {% if CURRENT_BED_TEMP < bed_final_threshold %}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED_TEMP - (BED_TEMP * 0.05)}
  {% endif %}

  # Home if needed
  _HOME_IF_NEEDED AXES=XYZ

  # Drop any stale Z babystep; the persistent bias lives in tap_z_offset
  SET_GCODE_OFFSET Z=0 MOVE=0

  # Wipe the nozzle (no purge) and set true Z=0 by nozzle contact
  CLEAN_NOZZLE_BRUSH EXTRUDER_TEMP={TAP_EXTRUDER_TEMP} PURGE=0
  EDDY_TAP

  # calibrate bed: adaptive tap mesh (nozzle contact at every point),
  # referenced to the tap Z=0 via zero_reference_position
  BED_MESH_CALIBRATE ADAPTIVE=1
  # BED_MESH_PROFILE LOAD=full18

  G90
  G1 Z50 F3000
  G1 X0 Y55 F7800

  # Now bring the extruder to full printing temperature
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET={EXTRUDER_TEMP}

  # wait for final extruder temperature before nozzle wipe
  # (unconditional: the extruder was held at the tap-safe temperature above)
  TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER_TEMP - 2} MAXIMUM={EXTRUDER_TEMP + 2}

  # wipe nozzle
  G90
  G1 X-4 Y55 F7800
  G1 Z0 F1200

  G91 # Enable relative positioning
  G92 E0 # extruder reset

  {% if printer.extruder.temperature < EXTRUDER_TEMP %}
  M109 S{EXTRUDER_TEMP}
  {% endif %}

  G1 E10 F60
  G4 P2000
  G1 E-2 F2000
  G4 P2000
  M106 S26

  # wait for bed temperature before printing (skip if already above 95% of target)
  {% set bed_print_threshold = BED_TEMP * 0.95 %}
  {% if CURRENT_BED_TEMP < bed_print_threshold %}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED_TEMP - 2} MAXIMUM={BED_TEMP + 2}
  {% endif %}

  # First pass
  G1 X0.12 Y-53 F500   # First pass slow
  M106 S128
  G1 X0.12 Y53 F5000   # 1
  G1 X0.12 Y-53 F5000  # 2
  G1 X0.12 Y53 F5000   # 3
  G1 X0.12 Y-53 F5000  # 4

  G90 # Return to absolute positioning

  M106 S0
  G1 Z10 F1200
  G1 X0 Y0 F5000

  _RESTORE_MOTION_LIMITS


[gcode_macro END_PRINT]
gcode:
  _SET_SAFE_MOTION

  # set park positon for x and y
  {% set x_park = 0 %}
  {% set y_park = printer.toolhead.axis_maximum.y|float %}

  # calculate safe lift position
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set current_z = printer.toolhead.position.z|float %}
  {% if current_z < (max_z - 20.0) %}
    {% set z_safe = 20.0 %}
  {% else %}
    {% set z_safe = max_z - current_z %}
  {% endif %}

  # move z to safe position
  G91
  G1 Z{z_safe} F1200

  # move to parking position
  G90
  G1 X{x_park} Y{y_park} F5000

  _SYSTEMS_OFF HEATERS=1 FANS=0 MOTORS=1

  G4 P1000

  _RESTORE_MOTION_LIMITS
  SET_INPUT_SHAPER SHAPER_FREQ_X={printer.configfile.settings.input_shaper.shaper_freq_x} SHAPER_FREQ_Y={printer.configfile.settings.input_shaper.shaper_freq_y}

  {% if printer.extruder.temperature > 50 %}
    M106 S51 # Set fan to 20% (51/255 ~= 20%)
    UPDATE_DELAYED_GCODE ID=_END_PRINT_FAN_COOLDOWN DURATION=5
  {% else %}
    M107
  {% endif %}


[delayed_gcode _END_PRINT_FAN_COOLDOWN]
gcode:
  {% if printer.extruder.temperature > 50 %}
    # Keep model fan at 20% until hotend cools below threshold.
    M106 S51
    UPDATE_DELAYED_GCODE ID=_END_PRINT_FAN_COOLDOWN DURATION=5
  {% else %}
    M107
  {% endif %}
