###############################################################################################################################################################################
# Manual Leveling
###############################################################################################################################################################################
# ===========================================================================
# Manual Bed Leveling Configuration
# ===========================================================================
#
# Neptune 3 Pro bed screw positions:
# - Bed size: 225x225mm (printable area)
# - Physical bed: ~235x235mm
# - 4 screws in corners
#
# Coordinate model (tap probing):
# - SCREWS_TILT_CALCULATE is run with METHOD=tap: the measurement point is
#   the NOZZLE contact, probe XY offsets are not applied (Klipper returns
#   zero offsets for tap).
# - Physical screws form a ~170x170mm square centered on the bed:
#   (30, 30), (200, 30), (200, 200), (30, 200).
# - During a tap BOTH the nozzle and the Eddy sensor (offset -34.20, +24.15)
#   must stay above the bed, so the measurement points are pulled inward
#   where needed: +15mm in X at the left screws, -5mm in Y at the rear ones.
#   This does not bias the leveling result: at convergence all points are
#   equal, so a flat bed ends up level regardless of the small offset.
# - Do not run a bare SCREWS_TILT_CALCULATE without METHOD=tap with these
#   coordinates: the sensor would measure ~34mm away from the screws.
#   LEVEL_CORNERS reuses the same coordinates directly.
#
# ===========================================================================

[screws_tilt_adjust]
# Tap positions as close as possible to the physical screws
screw1: 45, 195
screw1_name: rear_left

screw2: 200, 195
screw2_name: rear_right

screw3: 200, 30
screw3_name: front_right

screw4: 45, 30
screw4_name: front_left

# Movement settings
speed: 120
horizontal_move_z: 10
screw_thread: CW-M4  # Clockwise M4 thread


# ===========================================================================
# Manual Leveling Macros
# ===========================================================================

[gcode_macro LEVEL_BED_SCREWS]
description: "Assisted manual bed leveling with probe measurements"
gcode:
  {action_respond_info("===========================================")}
  {action_respond_info("  MANUAL BED LEVELING ASSISTANT")}
  {action_respond_info("===========================================")}
  {action_respond_info("")}
  {action_respond_info("This will measure bed tilt at each screw")}
  {action_respond_info("and tell you how much to adjust each screw")}
  {action_respond_info("")}
  {action_respond_info("Instructions:")}
  {action_respond_info("  • CW = Clockwise (tighten/lower)")}
  {action_respond_info("  • CCW = Counter-clockwise (loosen/raise)")}
  {action_respond_info("  • 1 full turn = 0.7mm adjustment")}
  {action_respond_info("  • 00:15 = 15 minutes on clock = 1/4 turn")}
  {action_respond_info("")}
  {action_respond_info("===========================================")}

  # Check if homed
  {% if "xyz" not in printer.toolhead.homed_axes %}
    {action_respond_info("Homing all axes...")}
    _HOME_IF_NEEDED AXES=XYZ
  {% endif %}

  # Run screw tilt calculation with tap probing (nozzle contact).
  # The nozzle must be clean: filament on the tip skews the results.
  {action_respond_info("Measuring bed tilt (tap probing, keep the nozzle clean)...")}
  SCREWS_TILT_CALCULATE METHOD=tap

  {action_respond_info("===========================================")}
  {action_respond_info("Adjustment complete!")}
  {action_respond_info("If adjustments were large, run again to verify")}
  {action_respond_info("Target: All screws within ±0.05mm")}
  {action_respond_info("===========================================")}


[gcode_macro BED_SCREWS_MANUAL]
description: "Manual bed leveling with paper test (no probe)"
gcode:
  {action_respond_info("===========================================")}
  {action_respond_info("  MANUAL BED LEVELING (PAPER TEST)")}
  {action_respond_info("===========================================")}
  {action_respond_info("")}
  {action_respond_info("Instructions:")}
  {action_respond_info("  1. Place paper under nozzle")}
  {action_respond_info("  2. Adjust screw until paper has slight drag")}
  {action_respond_info("  3. Press ACCEPT to move to next screw")}
  {action_respond_info("  4. Repeat for all screws")}
  {action_respond_info("")}
  {action_respond_info("===========================================")}

  # Home if needed
  _HOME_IF_NEEDED AXES=XYZ

  # Start bed screws adjust
  BED_SCREWS_ADJUST


[gcode_macro VERIFY_BED_LEVEL]
description: "Verify bed level by probing multiple points"
gcode:
  {action_respond_info("===========================================")}
  {action_respond_info("  BED LEVEL VERIFICATION")}
  {action_respond_info("===========================================")}

  # Home if needed
  _HOME_IF_NEEDED AXES=XYZ

  # Tap at screw positions (nozzle contact - keep the nozzle clean)
  {action_respond_info("Tap probing at screw positions...")}
  SCREWS_TILT_CALCULATE METHOD=tap

  {action_respond_info("")}
  {action_respond_info("Verification complete!")}
  {action_respond_info("Check results above")}
  {action_respond_info("===========================================")}


# Corner leveling is a step-by-step state machine: a macro cannot pause
# mid-expansion in Klipper, so each stop is a separate command.
# Usage: LEVEL_CORNERS, adjust the screw, LEVEL_CORNERS_NEXT, repeat.
[gcode_macro LEVEL_CORNERS]
description: "Start corner leveling: move the nozzle above the first bed screw"
variable_idx: 0
gcode:
  {action_respond_info("===========================================")}
  {action_respond_info("  CORNER LEVELING ASSISTANT")}
  {action_respond_info("===========================================")}
  {action_respond_info("Paper test at each screw position.")}
  {action_respond_info("After adjusting a screw, run LEVEL_CORNERS_NEXT")}
  {action_respond_info("===========================================")}

  # Home if needed
  _HOME_IF_NEEDED AXES=XYZ

  SET_GCODE_VARIABLE MACRO=LEVEL_CORNERS VARIABLE=idx VALUE=0
  _LEVEL_CORNERS_MOVE


[gcode_macro LEVEL_CORNERS_NEXT]
description: "Move to the next corner (after LEVEL_CORNERS)"
gcode:
  {% set idx = printer["gcode_macro LEVEL_CORNERS"].idx|int %}

  {% if "xyz" not in printer.toolhead.homed_axes %}
    {action_raise_error("Not homed. Start with LEVEL_CORNERS")}
  {% endif %}

  {% if idx >= 3 %}
    # All corners done - return to center
    G90
    G1 Z10 F600
    G1 X{printer.toolhead.axis_maximum.x / 2} Y{printer.toolhead.axis_maximum.y / 2} F6000
    SET_GCODE_VARIABLE MACRO=LEVEL_CORNERS VARIABLE=idx VALUE=0
    {action_respond_info("===========================================")}
    {action_respond_info("Corner leveling complete!")}
    {action_respond_info("Run LEVEL_BED_SCREWS to verify with probe")}
    {action_respond_info("===========================================")}
  {% else %}
    SET_GCODE_VARIABLE MACRO=LEVEL_CORNERS VARIABLE=idx VALUE={idx + 1}
    _LEVEL_CORNERS_MOVE
  {% endif %}


[gcode_macro _LEVEL_CORNERS_MOVE]
description: "Hidden helper: move the nozzle above the current corner screw"
gcode:
  {% set idx = printer["gcode_macro LEVEL_CORNERS"].idx|int %}
  {% set st = printer.configfile.settings.screws_tilt_adjust %}
  {% set screws = [
      (st.screw1, st.screw1_name),
      (st.screw2, st.screw2_name),
      (st.screw3, st.screw3_name),
      (st.screw4, st.screw4_name)] %}
  {% set coord = screws[idx][0] %}
  {% set name = screws[idx][1] %}

  # screws_tilt_adjust coordinates are physical screw positions (tap
  # probing model), so the nozzle goes there directly. Clamp into the
  # reachable range just in case.
  {% set ax_min = printer.toolhead.axis_minimum %}
  {% set ax_max = printer.toolhead.axis_maximum %}
  {% set x = [[coord[0], ax_min.x]|max, ax_max.x]|min %}
  {% set y = [[coord[1], ax_min.y]|max, ax_max.y]|min %}

  G90
  G1 Z10 F600
  G1 X{x} Y{y} F6000
  G1 Z0.1 F300

  {action_respond_info("Corner %d/4 (%s): X%.1f Y%.1f" % (idx + 1, name, x, y))}
  {action_respond_info("Adjust the screw, then run LEVEL_CORNERS_NEXT")}
