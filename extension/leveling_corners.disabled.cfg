###############################################################################################################################################################################
# Corner Leveling (paper test)
###############################################################################################################################################################################
# Pluggable module: rename to leveling_corners.enabled.cfg to activate.
# Fallback for when tap probing (LEVEL_BED_SCREWS) is unavailable,
# e.g. the Eddy probe is disconnected or uncalibrated.
#
# Requires the [screws_tilt_adjust] section from leveling_manual.enabled.cfg
# (corner positions are read from its screw coordinates).
#
# Corner leveling is a step-by-step state machine: a macro cannot pause
# mid-expansion in Klipper, so each stop is a separate command.
# Usage: LEVEL_CORNERS, adjust the screw, LEVEL_CORNERS_NEXT, repeat.

[gcode_macro LEVEL_CORNERS]
description: "Start corner leveling: move the nozzle above the first bed screw"
variable_idx: 0
gcode:
  {action_respond_info("===========================================")}
  {action_respond_info("  CORNER LEVELING ASSISTANT")}
  {action_respond_info("===========================================")}
  {action_respond_info("Paper test at each screw position.")}
  {action_respond_info("After adjusting a screw, run LEVEL_CORNERS_NEXT")}
  {action_respond_info("===========================================")}

  # Home if needed
  _HOME_IF_NEEDED AXES=XYZ

  SET_GCODE_VARIABLE MACRO=LEVEL_CORNERS VARIABLE=idx VALUE=0
  _LEVEL_CORNERS_MOVE


[gcode_macro LEVEL_CORNERS_NEXT]
description: "Move to the next corner (after LEVEL_CORNERS)"
gcode:
  {% set idx = printer["gcode_macro LEVEL_CORNERS"].idx|int %}

  {% if "xyz" not in printer.toolhead.homed_axes %}
    {action_raise_error("Not homed. Start with LEVEL_CORNERS")}
  {% endif %}

  {% if idx >= 3 %}
    # All corners done - return to center
    G90
    G1 Z10 F600
    G1 X{printer.toolhead.axis_maximum.x / 2} Y{printer.toolhead.axis_maximum.y / 2} F6000
    SET_GCODE_VARIABLE MACRO=LEVEL_CORNERS VARIABLE=idx VALUE=0
    {action_respond_info("===========================================")}
    {action_respond_info("Corner leveling complete!")}
    {action_respond_info("Run LEVEL_BED_SCREWS to verify with probe")}
    {action_respond_info("===========================================")}
  {% else %}
    SET_GCODE_VARIABLE MACRO=LEVEL_CORNERS VARIABLE=idx VALUE={idx + 1}
    _LEVEL_CORNERS_MOVE
  {% endif %}


[gcode_macro _LEVEL_CORNERS_MOVE]
description: "Hidden helper: move the nozzle above the current corner screw"
gcode:
  {% set idx = printer["gcode_macro LEVEL_CORNERS"].idx|int %}
  {% set st = printer.configfile.settings.screws_tilt_adjust %}
  {% set screws = [
      (st.screw1, st.screw1_name),
      (st.screw2, st.screw2_name),
      (st.screw3, st.screw3_name),
      (st.screw4, st.screw4_name)] %}
  {% set coord = screws[idx][0] %}
  {% set name = screws[idx][1] %}

  # screws_tilt_adjust coordinates are physical screw positions (tap
  # probing model), so the nozzle goes there directly. Clamp into the
  # reachable range just in case.
  {% set ax_min = printer.toolhead.axis_minimum %}
  {% set ax_max = printer.toolhead.axis_maximum %}
  {% set x = [[coord[0], ax_min.x]|max, ax_max.x]|min %}
  {% set y = [[coord[1], ax_min.y]|max, ax_max.y]|min %}

  G90
  G1 Z10 F600
  G1 X{x} Y{y} F6000
  G1 Z0.1 F300

  {action_respond_info("Corner %d/4 (%s): X%.1f Y%.1f" % (idx + 1, name, x, y))}
  {action_respond_info("Adjust the screw, then run LEVEL_CORNERS_NEXT")}
