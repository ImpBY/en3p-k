# Most of specific things for Neptune 3/Neptune Pro are listed there, make sure you follow the guide on setting up Eddy at https://github.com/bigtreetech/eddy

[mcu eddy]
serial: /dev/serial/by-id/usb-Klipper_rp2040_5044506128C0751C-if00
restart_method: command
# is_non_critical: true

[temperature_sensor eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 0
max_temp: 100 

[temperature_probe eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26

[probe_eddy_current eddy]
sensor_type: ldc1612
i2c_mcu: eddy
i2c_bus: i2c0f
x_offset: -34.20
y_offset: 24.15
# descend_z: 4.0
speed: 5.0
lift_speed: 10.0
samples: 1
sample_retract_dist: 2.0
samples_result: median
samples_tolerance: 0.005
samples_tolerance_retries: 5

[bed_mesh]
# Defaults are set for METHOD=tap (nozzle contact at every mesh point):
# - horizontal_move_z 5: tap needs a 3-20mm start height; 1mm risks an
#   undetected contact and a crash. The BED_MESH_CALIBRATE override passes
#   HORIZONTAL_MOVE_Z=1 when METHOD=scan/rapid_scan is requested.
# - Bounds keep the Eddy sensor (offset -34.20/+24.15) above the bed at
#   every point for tap (x >= 45, y <= 200) and keep scan nozzle moves
#   within travel (x <= 195).
horizontal_move_z: 5.0
mesh_min: 45,26
mesh_max: 195,200
probe_count: 9, 9
algorithm: bicubic
speed: 100
fade_start: 0.4
fade_end: 1.0
fade_target: 0.0
split_delta_z: 0.01
zero_reference_position: 115, 115
# zero_reference_position: 149.25, 89.5
adaptive_margin: 0
scan_overshoot: 1

[safe_z_home]
# home_xy_position: 115, 115
home_xy_position: 149.25, 89.5
move_to_previous: False
z_hop: 6.0
z_hop_speed: 5.0

# [force_move]
# enable_force_move: True # Enabled in core

# One-time sensor calibration macros (drive current, descend_z, thermal
# drift) live in extension/eddy_calibration.disabled.cfg. Rename it to
# .enabled.cfg for the initial setup or after replacing the sensor.

# ===========================================================================
# TAP workflow (native Klipper "tap" probing, requires Klipper >= v0.13.0-700)
# ===========================================================================
# Tap probing needs a calibrated tap_threshold. Calibrate once with
# EDDY_CALIBRATE_TAP STAGE=guess -> refine -> verify, then SAVE_CONFIG.
# The value is stored in the SAVE_CONFIG block of the live printer.cfg.

[gcode_macro EDDY_TAP]
description: "Set true Z=0 by tapping the bed with the nozzle. Usage: EDDY_TAP [X=..] [Y=..] [START_Z=5] [SAMPLES=3]"
variable_tap_sum: 0.0
variable_tap_count: 0
variable_tap_min: 0.0
variable_tap_max: 0.0
gcode:
  {% set tap_x = params.X|default(printer.toolhead.axis_maximum.x / 2)|float %}
  {% set tap_y = params.Y|default(printer.toolhead.axis_maximum.y / 2)|float %}
  {% set start_z = params.START_Z|default(5.0)|float %}
  {% set samples = params.SAMPLES|default(3)|int %}

  {% if samples < 1 %}
    {action_raise_error("SAMPLES must be at least 1")}
  {% endif %}

  {% if "xyz" not in printer.toolhead.homed_axes %}
    {action_raise_error("EDDY_TAP requires homed XYZ axes")}
  {% endif %}

  {% set probe_cfg = printer.configfile.settings['probe_eddy_current eddy'] %}
  {% if probe_cfg.tap_threshold|default(0)|float <= 0 %}
    {action_respond_info("ERROR: tap_threshold is not calibrated!")}
    {action_respond_info("Run EDDY_CALIBRATE_TAP STAGE=guess first")}
    {action_raise_error("tap_threshold not configured")}
  {% endif %}

  {action_respond_info("Tap probing at X%.1f Y%.1f (%d samples)..." % (tap_x, tap_y, samples))}

  # A loaded mesh would distort the tap result
  BED_MESH_CLEAR

  # Reset the sample accumulator
  SET_GCODE_VARIABLE MACRO=EDDY_TAP VARIABLE=tap_sum VALUE=0.0
  SET_GCODE_VARIABLE MACRO=EDDY_TAP VARIABLE=tap_count VALUE=0

  G90
  G1 Z{start_z} F600
  G1 X{tap_x} Y{tap_y} F6000

  {% for i in range(samples) %}
    PROBE METHOD=tap
    _EDDY_TAP_COLLECT
    G90
    G1 Z{start_z} F600
  {% endfor %}

  _EDDY_TAP_APPLY

  G90
  G1 Z5 F600


[gcode_macro _EDDY_TAP_COLLECT]
description: "Hidden helper: accumulate the last tap result"
gcode:
  {% set m = printer["gcode_macro EDDY_TAP"] %}
  {% set contact_z = printer.probe.last_probe_position[2] %}
  SET_GCODE_VARIABLE MACRO=EDDY_TAP VARIABLE=tap_sum VALUE={m.tap_sum + contact_z}
  SET_GCODE_VARIABLE MACRO=EDDY_TAP VARIABLE=tap_count VALUE={m.tap_count + 1}
  {% if m.tap_count == 0 %}
    SET_GCODE_VARIABLE MACRO=EDDY_TAP VARIABLE=tap_min VALUE={contact_z}
    SET_GCODE_VARIABLE MACRO=EDDY_TAP VARIABLE=tap_max VALUE={contact_z}
  {% else %}
    SET_GCODE_VARIABLE MACRO=EDDY_TAP VARIABLE=tap_min VALUE={[m.tap_min, contact_z]|min}
    SET_GCODE_VARIABLE MACRO=EDDY_TAP VARIABLE=tap_max VALUE={[m.tap_max, contact_z]|max}
  {% endif %}
  {action_respond_info("Tap sample %d: contact Z=%.4f" % (m.tap_count + 1, contact_z))}


[gcode_macro _EDDY_TAP_APPLY]
description: "Hidden helper: apply the averaged tap result as the true Z=0 reference"
gcode:
  {% set m = printer["gcode_macro EDDY_TAP"] %}
  {% if m.tap_count < 1 %}
    {action_raise_error("No tap samples collected")}
  {% endif %}
  {% set avg_z = m.tap_sum / m.tap_count %}
  {% set spread = m.tap_max - m.tap_min %}
  {% set current_z = printer.toolhead.position.z %}
  SET_KINEMATIC_POSITION Z={current_z - avg_z}
  {action_respond_info("Tap result: %d samples, avg contact Z=%.4f, spread %.4fmm" % (m.tap_count, avg_z, spread))}
  {action_respond_info("Kinematic Z set to %.4f" % (current_z - avg_z))}
  {% if m.tap_count > 1 and spread > 0.025 %}
    {action_respond_info("WARNING: tap spread %.4fmm > 0.025mm" % spread)}
    {action_respond_info("Check that the nozzle and bed are clean, then re-run EDDY_TAP")}
  {% endif %}


[gcode_macro EDDY_CALIBRATE_TAP]
description: "Calibrate tap_threshold. Usage: EDDY_CALIBRATE_TAP STAGE=guess|refine|verify"
gcode:
  {% set stage = params.STAGE|default('guess')|lower %}
  {% if stage not in ['guess', 'refine', 'verify'] %}
    {action_raise_error("STAGE must be guess, refine or verify")}
  {% endif %}

  {% if "xyz" not in printer.toolhead.homed_axes %}
    {action_raise_error("EDDY_CALIBRATE_TAP requires homed XYZ axes")}
  {% endif %}

  {action_respond_info("=== TAP THRESHOLD CALIBRATION (%s) ===" % stage)}
  {action_respond_info("Make sure the nozzle and bed are CLEAN")}
  {action_respond_info("Be ready to issue M112 if the descent does not stop!")}

  BED_MESH_CLEAR
  G90
  G1 Z5 F600
  G1 X{printer.toolhead.axis_maximum.x / 2} Y{printer.toolhead.axis_maximum.y / 2} F6000

  PROBE_EDDY_CURRENT_TAP_CALIBRATE TAP={stage}

  {% if stage == 'guess' %}
    {action_respond_info("Next: EDDY_CALIBRATE_TAP STAGE=refine")}
  {% elif stage == 'refine' %}
    {action_respond_info("Next: EDDY_CALIBRATE_TAP STAGE=verify")}
  {% else %}
    {action_respond_info("If verify succeeded, run SAVE_CONFIG to store tap_threshold")}
  {% endif %}


# Fold the current Z G-Code offset (babystepping) into tap_z_offset so that
# future tap probes account for it. Run SAVE_CONFIG afterwards to persist.
[gcode_macro Z_OFFSET_APPLY_PROBE]
rename_existing: Z_OFFSET_APPLY_PROBE_ORIG
description: "Apply the current Z G-Code offset to tap_z_offset"
gcode:
  Z_OFFSET_APPLY_PROBE_ORIG METHOD=tap
  {action_respond_info("Z offset applied to tap_z_offset. Run SAVE_CONFIG to persist.")}


[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BTT_BED_MESH_CALIBRATE
description: "Calibrate bed mesh. Usage: BED_MESH_CALIBRATE [ADAPTIVE=1] [PROFILE=name]"
gcode:
  {% set adaptive = params.ADAPTIVE|default(1)|int %}
  {% set method = params.METHOD|default('tap')|lower %}

  # Start height depends on the method: tap needs 3-20mm, scan needs ~1mm
  {% if method in ['scan', 'rapid_scan'] %}
    {% set hmz = params.HORIZONTAL_MOVE_Z|default(1.0)|float %}
  {% else %}
    {% set hmz = params.HORIZONTAL_MOVE_Z|default(5.0)|float %}
  {% endif %}

  {% if method == 'tap' %}
    {% set probe_cfg = printer.configfile.settings['probe_eddy_current eddy'] %}
    {% if probe_cfg.tap_threshold|default(0)|float <= 0 %}
      {action_respond_info("ERROR: tap_threshold is not calibrated!")}
      {action_respond_info("Run EDDY_CALIBRATE_TAP STAGE=guess first")}
      {action_raise_error("tap_threshold not configured")}
    {% endif %}
  {% endif %}

  {action_respond_info("Starting bed mesh calibration (adaptive=%s, method=%s, hmz=%.1f)..." % (adaptive, method, hmz))}

  # Reduce velocity for mesh calibration
  _SET_SAFE_MOTION

  # Home if not already homed
  {% if "xyz" not in printer.toolhead.homed_axes %}
    {action_respond_info("Homing all axes...")}
    _HOME_IF_NEEDED AXES=XYZ
  {% else %}
    {action_respond_info("Printer already homed, skipping G28")}
  {% endif %}

  # Run mesh calibration with user parameters
  {% if adaptive == 1 %}
    {action_respond_info("Running ADAPTIVE mesh calibration...")}
    BTT_BED_MESH_CALIBRATE METHOD={method} HORIZONTAL_MOVE_Z={hmz} ADAPTIVE=1 {rawparams}
  {% else %}
    {action_respond_info("Running FULL mesh calibration...")}
    BTT_BED_MESH_CALIBRATE METHOD={method} HORIZONTAL_MOVE_Z={hmz} {rawparams}
  {% endif %}

  # Restore velocity limits
  _RESTORE_MOTION_LIMITS

  {action_respond_info("Bed mesh calibration complete!")}

[gcode_macro EDDY_STATUS]
description: "Display Eddy probe status and calibration info"
gcode:
  {action_respond_info("=== EDDY PROBE STATUS ===")}

  # Check if Eddy MCU is connected
  {% if 'probe_eddy_current eddy' in printer %}
    {action_respond_info("✓ Eddy MCU: Connected")}

    # Temperature sensor status
    {% if 'temperature_sensor eddy_mcu' in printer %}
      {action_respond_info("  MCU Temperature: %.1f°C" % printer['temperature_sensor eddy_mcu'].temperature)}
    {% endif %}

    # Probe temperature
    {% if 'temperature_probe eddy' in printer %}
      {action_respond_info("  Probe Temperature: %.1f°C" % printer['temperature_probe eddy'].temperature)}
    {% endif %}

    # Probe configuration
    {% if 'probe_eddy_current eddy' in printer.configfile.settings %}
      {% set probe_cfg = printer.configfile.settings['probe_eddy_current eddy'] %}
      {% set descend_z = probe_cfg.descend_z|default(None) %}
      {action_respond_info("  X Offset: %.2fmm" % probe_cfg.x_offset)}
      {action_respond_info("  Y Offset: %.2fmm" % probe_cfg.y_offset)}
      {% if descend_z is not none %}
        {action_respond_info("  Descend Z: %.3fmm" % descend_z)}
      {% else %}
        {action_respond_info("  ⚠ Descend Z: NOT CALIBRATED")}
      {% endif %}
      {action_respond_info("  Speed: %.1fmm/s" % probe_cfg.speed)}
      {action_respond_info("  Lift Speed: %.1fmm/s" % probe_cfg.lift_speed)}

      # Tap configuration
      {% set tap_threshold = probe_cfg.tap_threshold|default(0)|float %}
      {% if tap_threshold > 0 %}
        {action_respond_info("  Tap Threshold: %.1f Hz/mm" % tap_threshold)}
        {action_respond_info("  Tap Z Offset: %.3fmm" % probe_cfg.tap_z_offset)}
      {% else %}
        {action_respond_info("  ⚠ Tap: NOT CALIBRATED (run EDDY_CALIBRATE_TAP)")}
      {% endif %}
    {% endif %}

    # Last probe position
    {% set last_probe = printer.probe.last_probe_position|default(None) %}
    {% if last_probe is not none %}
      {action_respond_info("  Last Probe Z: %.3fmm" % last_probe[2])}
    {% endif %}

  {% else %}
    {action_respond_info("✗ Eddy MCU: NOT CONNECTED")}
    {action_respond_info("  Check USB connection and serial port")}
  {% endif %}

  {action_respond_info("=========================")}

[gcode_macro EDDY_TEST_PROBE]
description: "Quick test of Eddy probe functionality"
gcode:
  {action_respond_info("=== EDDY PROBE TEST ===")}

  # Check if probe is configured
  {% if 'probe_eddy_current eddy' not in printer.configfile.settings %}
    {action_respond_info("ERROR: Eddy probe not configured!")}
    {action_raise_error("Eddy probe not found in configuration")}
  {% endif %}

  # Check descend_z calibration
  {% set probe_cfg = printer.configfile.settings['probe_eddy_current eddy'] %}
  {% if probe_cfg.descend_z|default(None) is none %}
    {action_respond_info("WARNING: Descend Z not calibrated!")}
    {action_respond_info("Enable the eddy_calibration module and run EDDY_CALIBRATE_PROBE first")}
  {% endif %}

  # Home if needed
  {% if "xyz" not in printer.toolhead.homed_axes %}
    {action_respond_info("Homing all axes...")}
    _HOME_IF_NEEDED AXES=XYZ
  {% endif %}

  # Move to center
  {% set center_x = printer.toolhead.axis_maximum.x / 2 %}
  {% set center_y = printer.toolhead.axis_maximum.y / 2 %}

  {action_respond_info("Moving to bed center...")}
  G90
  G1 X{center_x} Y{center_y} Z10 F6000

  # Perform test probes
  {action_respond_info("Performing 5 test probes...")}

  PROBE_ACCURACY SAMPLES=5

  {action_respond_info("=== TEST COMPLETE ===")}
  {action_respond_info("Check probe accuracy results above")}
  {action_respond_info("Standard deviation should be < 0.010mm")}
  {action_respond_info("======================")}
