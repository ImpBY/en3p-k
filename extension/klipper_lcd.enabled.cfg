# ===========================================================================
# KlipperLCD service integration macros
# ===========================================================================
# Used by the KlipperLCD service (Elegoo Neptune 3 Pro stock LCD panel).
# The LCD "Level" button runs _LCD_BED_LEVELING; the save button on the
# leveling result screen runs _LCD_LEVELING_SAVE. The "_" prefix hides
# the macros from the Fluidd macro list (service-internal, not for users).

[gcode_macro _LCD_BED_LEVELING]
description: "Bed leveling scan for the LCD panel (no SAVE_CONFIG)"
gcode:
  BED_LEVELING SAVE=0
  # Completion marker consumed by the KlipperLCD service to show the mesh.
  RESPOND MSG="LCD:LEVELING_DONE"

[gcode_macro _LCD_LEVELING_SAVE]
description: "Reset LCD toggles to defaults, then persist config (restarts Klipper)"
gcode:
  # The LCD panel resets its toggle indicators after the restart, so bring
  # the printer state back to defaults before persisting.
  M107                                                        ; model fan off
  SET_FILAMENT_SENSOR SENSOR=filament_runout_sensor ENABLE=1  ; sensor default: enabled
  LED_OFF                                                     ; chamber light off
  G4 P2000
  SAVE_CONFIG
