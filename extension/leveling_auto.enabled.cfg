###############################################################################################################################################################################
# Auto Leveling
###############################################################################################################################################################################

# ===========================================================================
# Auto Leveling Configuration
# ===========================================================================

[gcode_macro M420]
description: "Load bed mesh. Usage: M420 S1 (load) or M420 S0 (clear)"
gcode:
  {% set s = params.S|default(1)|int %}

  {% if s == 1 %}
    # Load mesh
    {% if printer.bed_mesh.profiles.default %}
      BED_MESH_PROFILE LOAD=default
      {action_respond_info("Bed mesh 'default' loaded")}
    {% else %}
      {action_respond_info("WARNING: No 'default' mesh profile found!")}
      {action_respond_info("Run BED_LEVELING to create one")}
    {% endif %}
  {% else %}
    # Clear mesh
    BED_MESH_CLEAR
    {action_respond_info("Bed mesh cleared")}
  {% endif %}


[gcode_macro BED_LEVELING]
description: "Full bed leveling sequence with TAP. Usage: BED_LEVELING [EXTRUDER=170] [BED=60] [SAVE=1] [TAP=1]"
gcode:
  {action_respond_info("===========================================")}
  {action_respond_info("  BED LEVELING SEQUENCE")}
  {action_respond_info("===========================================")}

  # Parameters
  {% set EXTRUDER_TEMP = params.EXTRUDER|default(170)|float %}
  {% set BED_TEMP = params.BED|default(60)|float %}
  {% set SAVE = params.SAVE|default(1)|int %}
  {% set TAP = params.TAP|default(1)|int %}

  # The nozzle is only used for wiping and tapping here, so cap the
  # temperature at the tap-safe level regardless of the parameter
  {% set TAP_EXTRUDER_TEMP = [EXTRUDER_TEMP, 170]|min %}
  {% if EXTRUDER_TEMP > 170 %}
    {action_respond_info("NOTE: extruder capped at 170C for the tap phase")}
  {% endif %}

  # Park position
  {% set x_park = printer.toolhead.axis_minimum.x|float %}
  {% set y_park = (printer.toolhead.axis_maximum.y - printer.toolhead.axis_minimum.y) / 2|float %}
  {% set z_park = 20|float %}

  # Step 1: Start heating
  {action_respond_info("Step 1/7: Starting heaters...")}
  {action_respond_info("  Extruder: %.0f°C" % TAP_EXTRUDER_TEMP)}
  {action_respond_info("  Bed: %.0f°C" % BED_TEMP)}
  M104 S{TAP_EXTRUDER_TEMP}  # Start heating extruder (don't wait)
  M140 S{BED_TEMP}           # Start heating bed (don't wait)

  # Step 2: Home while heating
  {action_respond_info("Step 2/7: Homing axes...")}
  _HOME_IF_NEEDED AXES=XYZ

  # Step 3: Wait for temperatures (also cools down after a hot start)
  {action_respond_info("Step 3/7: Waiting for temperatures...")}
  M190 S{BED_TEMP}       # Wait for bed
  TEMPERATURE_WAIT SENSOR=extruder MINIMUM={TAP_EXTRUDER_TEMP - 5} MAXIMUM={TAP_EXTRUDER_TEMP + 15}

  # Step 4: Heat soak (optional but recommended)
  {action_respond_info("Step 4/7: Heat soaking (30 seconds)...")}
  G4 P30000  # Wait 30 seconds for thermal expansion

  # Step 5: Wipe nozzle (no purge - the nozzle must be clean for the tap)
  {action_respond_info("Step 5/7: Wiping nozzle...")}
  CLEAN_NOZZLE_BRUSH EXTRUDER_TEMP={TAP_EXTRUDER_TEMP} PURGE=0

  # Step 6: Set true Z=0 by nozzle contact
  {% if TAP == 1 and 'probe_eddy_current eddy' in printer.configfile.settings %}
    {action_respond_info("Step 6/7: Tap probing for true Z=0...")}
    EDDY_TAP
  {% else %}
    {action_respond_info("Step 6/7: Skipping tap (TAP=0 or no Eddy probe)")}
  {% endif %}

  # Step 7: Calibrate mesh
  {action_respond_info("Step 7/7: Calibrating bed mesh...")}
  {action_respond_info("This will take 2-5 minutes depending on resolution")}

  BED_MESH_CLEAR

  # Use a full tap mesh (nozzle contact at every point) if Eddy is configured
  {% if 'probe_eddy_current eddy' in printer.configfile.settings %}
    BED_MESH_CALIBRATE METHOD=tap ADAPTIVE=0 PROFILE=default
  {% else %}
    BED_MESH_CALIBRATE PROFILE=default
  {% endif %}

  # Park and finish
  {action_respond_info("Parking toolhead...")}
  G90
  G1 X{x_park} Y{y_park} Z{z_park} F6000

  {action_respond_info("===========================================")}
  {action_respond_info("Bed leveling complete!")}

  # Save or prompt
  {% if SAVE == 1 %}
    {action_respond_info("Saving configuration and restarting...")}
    {action_respond_info("Klipper will restart in 3 seconds")}
    G4 P3000
    SAVE_CONFIG
  {% else %}
    {action_respond_info("===========================================")}
    {action_respond_info("IMPORTANT: Mesh is loaded but NOT saved!")}
    {action_respond_info("To save permanently, run: SAVE_CONFIG")}
    {action_respond_info("To discard, restart Klipper without saving")}
    {action_respond_info("===========================================")}
  {% endif %}


[gcode_macro MESH_INFO]
description: "Display current mesh information"
gcode:
  {% set mesh = printer.bed_mesh %}
  {% set rows = mesh.probed_matrix|default([]) %}
  {% if rows|length > 0 and rows[0]|length > 0 %}
    {% set zmin = rows|map('min')|min %}
    {% set zmax = rows|map('max')|max %}
    {% set count = rows|length * rows[0]|length %}
    {% set zavg = rows|map('sum')|sum / count %}
    {action_respond_info("Current mesh: %s" % (mesh.profile_name if mesh.profile_name else "(unsaved)"))}
    {action_respond_info("  Size: %dx%d points" % (rows[0]|length, rows|length))}
    {action_respond_info("  Min: %.3fmm" % zmin)}
    {action_respond_info("  Max: %.3fmm" % zmax)}
    {action_respond_info("  Range: %.3fmm" % (zmax - zmin))}
    {action_respond_info("  Average: %.3fmm" % zavg)}
  {% else %}
    {action_respond_info("No mesh is currently loaded")}
    {action_respond_info("Run BED_LEVELING first")}
  {% endif %}
